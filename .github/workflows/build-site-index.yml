name: Build site index (and sitemap)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    
# 讓這類「自動改檔並推回 main」的 workflow，在整個 repo 同一時間只能跑一個
concurrency:
  group: repo-autogen-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-index:
    # 避免自己 commit 又觸發自己，無限循環
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate site-index.json
        run: |
          python scripts/build_site_index.py

      - name: Generate sitemap.xml
        run: |
          python scripts/generate_sitemap.py

      - name: Generate robots.txt
        run: |
          cat > robots.txt << 'EOF'
          User-agent: *
          Allow: /

          Sitemap: https://scottnick.github.io/sitemap.xml
          EOF

      - name: Commit & push changes (if any) with retry
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add site-index.json sitemap.xml robots.txt

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update site-index + sitemap [skip ci]"

          # 避免 remote 先被別的 commit 更新，先 rebase 再推；推失敗就重試幾次
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main || true
            if git push origin HEAD:main; then
              echo "Push succeeded."
              exit 0
            fi
            echo "Push failed, retrying... ($i/5)"
            sleep 2
          done

          echo "Push failed after retries."
          exit 1
