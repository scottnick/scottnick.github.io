name: Build site index

on:
  push:
    branches: ["main"]

# 防止同 workflow 同時跑，互相 push 打架
concurrency:
  group: build-site-index-${{ github.ref }}
  cancel-in-progress: false

# 讓 GITHUB_TOKEN 有寫入 repo 的權限（不然 push 會 403）
permissions:
  contents: write

jobs:
  build-index:
    # 避免 bot 自己推完又觸發自己，形成無限迴圈
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate site-index.json
        run: |
          python scripts/build_site_index.py

      # 如果你也要在這個 workflow 產生 robots / sitemap，就在這裡一起跑
      # （如果 robots/sitemap 是另一個 workflow 產生也沒關係）
      # - name: Generate robots.txt and sitemap.xml
      #   run: |
      #     python scripts/generate_sitemap.py
      #     # 或你實際用的指令

      - name: Commit & push changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 你要寫回 repo 的檔案都 add 起來（照你實際產物調整）
          git add site-index.json sitemap.xml robots.txt || true

          # 沒變更就結束
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update site index [skip ci]"

          # ★關鍵：push 前先把 remote 變更 rebase 下來（含 autostash，避免你遇到 unstaged changes）
          git pull --rebase --autostash origin main

          git push origin HEAD:main
